{% extends "admin/change_form.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
/* === Google Drive OAuth2 Panel === */
.gdrive-panel{margin:0 0 15px;padding:12px 16px;border-radius:8px;font-size:13px;line-height:1.6}
.gdrive-panel.info{background:#d1ecf1;border:1px solid #bee5eb}
.gdrive-tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600}
.gdrive-tag-ok{background:#d1fae5;color:#065f46}
</style>
{% endblock %}

{% block after_field_sets %}
{{ block.super }}
<script>
(function(){
  /* Find OAuth2 fieldset and add account management link */
  var fieldsets = document.querySelectorAll('fieldset');
  for (var i = 0; i < fieldsets.length; i++) {
    var h = fieldsets[i].querySelector('h2');
    if (h && h.textContent.indexOf('OAuth2') !== -1) {
      var panel = document.createElement('div');
      panel.className = 'gdrive-panel info';
      panel.innerHTML =
        '<strong>💡 Quản lý tài khoản Gmail:</strong> ' +
        'Sau khi cấu hình Client ID + Secret, vào ' +
        '<a href="/admin/mediastream/gdriveaccount/" style="font-weight:bold">Tài khoản GDrive</a> hoặc ' +
        '<a href="/admin/mediastream/streammedia/" style="font-weight:bold">Media Streams</a> ' +
        'để thêm tài khoản Gmail (nút <strong>➕ Thêm tài khoản Gmail</strong>).';
      var firstRow = fieldsets[i].querySelector('.form-row');
      if (firstRow) firstRow.parentElement.insertBefore(panel, firstRow);
      break;
    }
  }
})();
</script>
{% endblock %}
